name: Content Check

on:
  push:
    paths:
      - 'skills/**/*.md'
      - 'prompts/**/*.md'
      - 'project/**/*.md'
      - 'check_prompts.py'
      - '.github/workflows/content-check.yml'
  workflow_dispatch:

jobs:
  check-content:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: プロンプトをチェック
        run: python check_prompts.py
